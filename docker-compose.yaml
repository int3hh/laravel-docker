x-php-environment: &php-environment
  PUID: ${PUID:-1000}
  PGID: ${PGID:-1000}
  AUTORUN_ENABLED: "true"
  AUTORUN_LARAVEL_MIGRATION: "true"
  AUTORUN_LARAVEL_MIGRATION_FORCE: "true"
  PHP_OPCACHE_ENABLE: "1"
  PHP_OPCACHE_MEMORY_CONSUMPTION: "256"
  PHP_OPCACHE_INTERNED_STRINGS_BUFFER: "16"
  PHP_OPCACHE_MAX_ACCELERATED_FILES: "10000"
  PHP_OPCACHE_VALIDATE_TIMESTAMPS: "0"
  PHP_POST_MAX_SIZE: "120M"
  PHP_UPLOAD_MAX_FILE_SIZE: "120M"
  PHP_MAX_FILE_UPLOADS: "100"

x-php: &php
  build:
    context: .
    dockerfile: ./.docker/php/Dockerfile
    args:
      USER_ID: ${PUID:-1000}
      GROUP_ID: ${PGID:-1000}
  working_dir: /var/www/html
  restart: unless-stopped
  env_file: .env
  environment: *php-environment
  volumes:
    - ./:/var/www/html
    - /var/www/html/vendor
  expose:
    - "9000"
  networks:
    - app
    - database
  depends_on:
    pgsql:
      condition: service_healthy

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: "10"

x-worker-healthcheck: &worker-healthcheck
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

x-worker: &worker
  <<: [*php, *logging]
  environment:
    <<: *php-environment
    AUTORUN_ENABLED: "false"
  stop_grace_period: 60s
  depends_on:
    pgsql:
      condition: service_healthy
    php:
      condition: service_healthy
  deploy:
    resources:
      limits:
        memory: 256M

networks:
  app:
  database:

volumes:
  pgdata:

services:
  pgsql:
    container_name: PgSQL
    image: "postgres:18-alpine"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      PGDATA: /data/postgres
    volumes:
      - pgdata:/data/postgres
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  php:
    <<: [*php, *logging]
    healthcheck:
      <<: *worker-healthcheck
      test: ["CMD-SHELL", "php-fpm-healthcheck"]
    deploy:
      resources:
        limits:
          memory: 512M

  queue-default:
    <<: *worker
    command: php artisan queue:work --queue=default --tries=3 --backoff=10 --max-time=3600
    healthcheck:
      <<: *worker-healthcheck
      test: ["CMD", "healthcheck-queue"]

  queue-high:
    <<: *worker
    command: php artisan queue:work --queue=high --tries=3 --backoff=10 --max-time=3600
    healthcheck:
      <<: *worker-healthcheck
      test: ["CMD", "healthcheck-queue"]

  scheduler:
    <<: *worker
    command: php artisan schedule:work
    healthcheck:
      <<: *worker-healthcheck
      test: ["CMD", "healthcheck-schedule"]

  nginx:
    build:
      context: ./.docker/nginx
      dockerfile: Dockerfile
    container_name: Nginx
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped
    networks:
      - app
    volumes:
      - ./:/var/www/html:ro
    depends_on:
      php:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
